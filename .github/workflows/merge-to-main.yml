name: Version, Release, and Deploy on Merge to Main

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  version:
    name: Tag and Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version tag from PR label
        id: tag
        run: |
          LABEL=$(gh pr list \
                    --state merged \
                    --base main \
                    --json labels,mergedAt \
                    --jq 'sort_by(.mergedAt) | last | .labels[].name' \
                  2>/dev/null | grep -E '^major$|^minor$' | tail -1)

          LATEST=$(git tag -l 'v*.*' | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            NEW_TAG="v1.0"
          else
            MAJOR=$(echo $LATEST | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo $LATEST | sed 's/v//' | cut -d. -f2)

            if [ "$LABEL" = "major" ]; then
              NEW_TAG="v$((MAJOR + 1)).0"
            else
              NEW_TAG="v${MAJOR}.$((MINOR + 1))"
            fi
          fi

          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Tagging as $NEW_TAG (label: ${LABEL:-none})"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          make_latest: true

  build:
    name: Build Docusaurus
    needs: version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm install --frozen-lockfile

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
