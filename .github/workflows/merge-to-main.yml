name: Version, Release, and Deploy on Merge to Main

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  version:
    name: Tag and Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version tag from PR label
        id: tag
        run: |
          LABEL=$(gh pr list \
                    --state merged \
                    --base main \
                    --json labels,mergedAt \
                    --jq 'sort_by(.mergedAt) | last | .labels[].name' \
                  2>/dev/null | grep -E '^major$|^minor$' | tail -1)

          LATEST=$(git tag -l 'v*.*' | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            NEW_TAG="v0.1"
          else
            MAJOR=$(echo $LATEST | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo $LATEST | sed 's/v//' | cut -d. -f2)

            if [ "$LABEL" = "major" ]; then
              NEW_TAG="v$((MAJOR + 1)).0"
            else
              NEW_TAG="v${MAJOR}.$((MINOR + 1))"
            fi
          fi

          VERSION=${NEW_TAG#v}   # strip the leading 'v' for the installer
          echo "tag=$NEW_TAG"       >> $GITHUB_OUTPUT
          echo "version=$VERSION"   >> $GITHUB_OUTPUT
          echo "Tagging as $NEW_TAG (label: ${LABEL:-none})"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

  installer:
    name: Build Windows Installer
    needs: version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ needs.version.outputs.version }} `
            NetworkGen.iss
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer_output\*.exe

  release:
    name: Create GitHub Release
    needs: [version, installer]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: installer_output

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: installer_output/*.exe   # attach the installer to the release

  build:
    name: Build Docusaurus
    needs: version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm install --frozen-lockfile

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
